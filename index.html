<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Chordora - Guitar Chords & Setlists</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0A0F1D">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Chordora">
    
    <link rel="icon" type="image/png" href="./icon.png">
    
    <style>
        /* A simple style placeholder to make the blank app look less broken */
        body {
            background-color: #0A0F1D;
            color: #C19A6B;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }
    </style>
</head>
<body>

    <h1>Chordora</h1>
    <p>Loading...</p>

    <script>
      if ('serviceWorker' in navigator) {
        // Must exactly match your file name: sv.js
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sv.js')
            .then((registration) => {
              console.log('ServiceWorker registered with scope:', registration.scope);
            })
            .catch((error) => {
              console.log('ServiceWorker registration failed:', error);
            });
        });
      }
    </script>
</body>
</html>
